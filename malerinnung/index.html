<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLI Bremen · Website-Refresh Mockup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="shared/tokens.css" />
  <link rel="stylesheet" href="shared/common.css" />
  <link rel="stylesheet" href="variants/variant-a.css" />
  <link rel="stylesheet" href="variants/azubi.css" />

  <style>
    .switcher {
      position: fixed; top: 16px; right: 16px; z-index: 60;
      background: var(--ink-900); color: var(--paper);
      border-radius: 999px; padding: 6px;
      display: flex; gap: 4px;
      box-shadow: var(--shadow-2);
      font-family: var(--f-display);
    }
    .switcher button {
      border: 0; background: transparent; color: rgba(255,255,255,.75);
      padding: 8px 14px; border-radius: 999px;
      cursor: pointer; font-weight: 600; font-size: 12.5px; letter-spacing: -0.01em;
      transition: background .15s, color .15s;
    }
    .switcher button:hover { color: white; }
    .switcher button.active { background: var(--yellow-500); color: var(--ink-900); }
    .switcher__label {
      font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,.5);
      padding: 8px 12px 8px 14px;
      display: flex; align-items: center;
    }
    .tweaks {
      position: fixed; right: 16px; bottom: 16px; z-index: 60;
      background: var(--white); color: var(--ink-900);
      border-radius: var(--r-md); border: 1px solid var(--rule);
      padding: 18px; box-shadow: var(--shadow-2);
      width: 280px; font-family: var(--f-body);
      display: none;
    }
    .tweaks.open { display: block; }
    .tweaks h4 { font-family: var(--f-display); font-weight: 700; font-size: 14px; margin-bottom: 14px; letter-spacing: -0.01em; }
    .tweaks__row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; gap: 8px; }
    .tweaks__row span { font-size: 12.5px; color: var(--muted); }
    .tweaks__seg { display: inline-flex; background: var(--paper-2); border-radius: 999px; padding: 2px; }
    .tweaks__seg button { border: 0; background: transparent; padding: 4px 10px; font-size: 11.5px; border-radius: 999px; cursor: pointer; color: var(--ink-700); font-family: var(--f-mono); letter-spacing: 0.08em; text-transform: uppercase; }
    .tweaks__seg button.active { background: var(--ink-900); color: var(--paper); }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div class="switcher" id="switcher">
    <span class="switcher__label">Refresh</span>
    <button data-v="A" class="active">Startseite · Editorial</button>
    <button data-v="Z">Azubi-LP</button>
  </div>

  <div class="tweaks" id="tweaks">
    <h4>Tweaks</h4>
    <div class="tweaks__row">
      <span>Akzent­farbe</span>
      <div class="tweaks__seg" data-key="accent">
        <button data-val="warm" class="active">Warm</button>
        <button data-val="bright">Hell</button>
      </div>
    </div>
    <div class="tweaks__row">
      <span>Headline-Schrift</span>
      <div class="tweaks__seg" data-key="font">
        <button data-val="grotesk" class="active">Grotesk</button>
        <button data-val="serif">Serif</button>
      </div>
    </div>
    <div class="tweaks__row">
      <span>Mehr Weißraum</span>
      <div class="tweaks__seg" data-key="air">
        <button data-val="normal" class="active">Normal</button>
        <button data-val="airy">Luftig</button>
      </div>
    </div>
  </div>

  <main id="mount"></main>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared/common.jsx" data-presets="react"></script>
  <script type="text/babel" src="variants/variant-a.jsx" data-presets="react"></script>
  <script type="text/babel" src="variants/azubi.jsx" data-presets="react"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "variant": "A",
      "accent": "warm",
      "font": "grotesk",
      "air": "normal"
    }/*EDITMODE-END*/;

    const appState = { ...TWEAK_DEFAULTS };
    try {
      const saved = localStorage.getItem('mli-state');
      if (saved) Object.assign(appState, JSON.parse(saved));
    } catch(e){}

    function applyTweaks() {
      const root = document.documentElement;
      if (appState.accent === "bright") {
        root.style.setProperty('--yellow-500', '#FFD400');
        root.style.setProperty('--yellow-400', '#FFE24D');
      } else {
        root.style.setProperty('--yellow-500', '#f5c518');
        root.style.setProperty('--yellow-400', '#ffd84d');
      }
      if (appState.font === "serif") {
        root.style.setProperty('--f-display', '"Fraunces", "IBM Plex Serif", Georgia, serif');
      } else {
        root.style.setProperty('--f-display', '"Inter Tight", "Inter", system-ui, sans-serif');
      }
      document.body.style.letterSpacing = appState.air === "airy" ? "0.005em" : "";
    }

    function persist() {
      try { localStorage.setItem('mli-state', JSON.stringify(appState)); } catch(e){}
    }

    let rootInstance = null;
    function render() {
      const mount = document.getElementById('mount');
      if (!rootInstance) rootInstance = ReactDOM.createRoot(mount);
      if (appState.variant !== "A" && appState.variant !== "Z") appState.variant = "A";
      const el = appState.variant === "Z" ? <AzubiPage /> : <VariantA />;
      rootInstance.render(el);

      document.querySelectorAll('#switcher button').forEach(b => {
        b.classList.toggle('active', b.dataset.v === appState.variant);
      });
      applyTweaks();
      window.scrollTo({top: 0, behavior: 'instant'});
    }

    document.getElementById('switcher').addEventListener('click', (e) => {
      const b = e.target.closest('button[data-v]'); if (!b) return;
      appState.variant = b.dataset.v;
      persist(); render();
    });

    document.addEventListener('click', (e) => {
      const a = e.target.closest('a[href="azubi.html"]');
      if (!a) return;
      e.preventDefault();
      appState.variant = 'Z';
      persist(); render();
    });

    document.getElementById('tweaks').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-val]'); if (!btn) return;
      const key = btn.parentElement.dataset.key;
      const val = btn.dataset.val;
      appState[key] = val;
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
      persist();
      applyTweaks();
    });

    const tweaksEl = document.getElementById('tweaks');
    window.addEventListener('message', (e) => {
      const t = e.data && e.data.type;
      if (t === '__activate_edit_mode') tweaksEl.classList.add('open');
      else if (t === '__deactivate_edit_mode') tweaksEl.classList.remove('open');
    });
    try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}

    render();
  </script>
</body>
</html>
